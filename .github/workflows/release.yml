name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          BINARY="milk-${GOOS}-${GOARCH}${EXT}"
          go build \
            -ldflags "-s -w \
              -X main.version=${{ github.ref_name }} \
              -X main.commit=${{ github.sha }} \
              -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "$BINARY" \
            ./cmd/milk/

      - name: Checksum
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          BINARY="milk-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          sha256sum "$BINARY" > "${BINARY}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: milk-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            milk-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
