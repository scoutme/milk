---
version: '3'

vars:
  BIN: ~/.local/bin/milk
  CMD: ./cmd/milk
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}

tasks:
  default:
    cmds:
      - task -l
    silent: true

  fmt:
    desc: Format source code
    cmds:
      - find . -name '*.go' | grep -v vendor | xargs gofmt -s -w

  build:
    desc: Compile and install binary to DEST (default {{.BIN}})
    vars:
      DEST: '{{default .BIN .DEST}}'
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.DEST}} {{.CMD}}
    deps:
      - fmt

  build:local:
    desc: Compile binary into current directory
    cmds:
      - task: build
        vars:
          DEST: ./milk

  test:
    desc: Run all tests
    cmds:
      - go test ./...
    deps:
      - fmt

  run:
    desc: Build and start milk in interactive mode
    cmds:
      - '{{.BIN}}'
    deps:
      - build

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  install-scripts:
    desc: Install subprocess adapter scripts (milk-smolagent) to ~/.local/bin
    vars:
      SCRIPTS_DEST: ~/.local/bin
    cmds:
      - mkdir -p {{.SCRIPTS_DEST}}
      - cp scripts/milk-smolagent {{.SCRIPTS_DEST}}/milk-smolagent
      - chmod +x {{.SCRIPTS_DEST}}/milk-smolagent
      - echo "installed milk-smolagent to {{.SCRIPTS_DEST}}"

  demo:
    desc: Record the TUI demo gif (requires vhs)
    cmds:
      - vhs demo/demo.tape
    deps:
      - build

  ci:
    desc: fmt + vet + test + build
    cmds:
      - task: fmt
      - task: vet
      - task: test
      - task: build
