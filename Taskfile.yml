---
version: '3'

vars:
  BIN: ~/.local/bin/milk
  CMD: ./cmd/milk

tasks:
  default:
    cmds:
      - task -l
    silent: true

  fmt:
    desc: Format source code
    cmds:
      - find . -name '*.go' | grep -v vendor | xargs gofmt -s -w

  build:
    desc: Compile and install binary to DEST (default {{.BIN}})
    vars:
      DEST: '{{default .BIN .DEST}}'
    cmds:
      - go build -o {{.DEST}} {{.CMD}}
    deps:
      - fmt

  build:local:
    desc: Compile binary into current directory
    cmds:
      - task: build
        vars:
          DEST: ./milk

  test:
    desc: Run all tests
    cmds:
      - go test ./...
    deps:
      - fmt

  run:
    desc: Build and start milk in interactive mode
    cmds:
      - '{{.BIN}}'
    deps:
      - build

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  ci:
    desc: fmt + vet + test + build
    cmds:
      - task: fmt
      - task: vet
      - task: test
      - task: build
